name: Build Obsidian Plugin

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build plugin with Windows helper
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci

      - name: Build Rust clipboard helper
        run: npm run build:helper

      - name: Stage helper executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Copy-Item helper\target\release\excel-html-clipboard.exe bin\excel-html-clipboard-win32-x64.exe

      - name: Build Obsidian plugin
        run: npm run build

      - name: Prepare package
        shell: pwsh
        run: |
          $packageDir = "dist\excel-html-paste"
          New-Item -ItemType Directory -Force -Path "$packageDir\bin" | Out-Null
          Copy-Item manifest.json "$packageDir\manifest.json"
          Copy-Item main.js "$packageDir\main.js"
          Copy-Item styles.css "$packageDir\styles.css"
          Copy-Item bin\excel-html-clipboard-win32-x64.exe "$packageDir\bin\excel-html-clipboard-win32-x64.exe"

      - name: Create release zip
        shell: pwsh
        run: |
          $zipPath = "dist\excel-html-paste-plugin-${{ github.ref_name }}.zip"
          Compress-Archive -Path dist\excel-html-paste\* -DestinationPath $zipPath -Force

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-html-paste-plugin
          path: |
            dist/excel-html-paste
            dist/*.zip
          retention-days: 7

      - name: Attach plugin package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
